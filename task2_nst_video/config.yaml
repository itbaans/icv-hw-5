# =============================================================================
# Assignment 5 - Task 2 Configuration
# =============================================================================
# All hyperparameters for Task 2 are documented here for reproducibility.
# Run scripts from the task2_nst_video/ directory:
#   python matting/train.py    --config config.yaml
#   python video_pipeline.py   --config config.yaml
#   python visualize.py        --config config.yaml
# =============================================================================

task2:

  # --------------------------------------------------------------------------
  # Paths - fill these in once you add your video / style images
  # --------------------------------------------------------------------------
  input_video: "temp-vid.mp4"           # your raw recording (unmodified)
  content_dir: "content/"                  # 5 frames extracted from the video
  style_dir:   "style/"                    # 3 public-domain paintings
  output_dir:  "outputs/"

  # Path to one seed image from Task 1 (used for VGG19 feature-map figure)
  seed_img_for_feature_maps: "/kaggle/input/datasets/abdullahahmedani/seeds-data/filtered/106.png"

  # Source image for the 1024×1024 branded poster.
  # Set this to one of your best stylised frames after running the pipeline.
  branded_poster_source: ""

  # Style-weight sweep values for the β/α ablation (3 required)
  style_weight_sweep: [1000.0, 100000.0, 10000000.0]

  # The single style image used during video_pipeline.py
  # (choose your best-looking style for the final video)
  style_image: "style/field.jpg"

  # --------------------------------------------------------------------------
  # Human Matting Model
  # --------------------------------------------------------------------------
  matting:

    checkpoint: "/kaggle/input/models/abdullahahmedani/matting-model/pytorch/default/1/matting_best.pth"   # written by matting/train.py

    # Model config
    bilinear: false   # use ConvTranspose2d upsampling (false) vs bilinear (true)

    # Loss weights: L_total = lambda_l1 * L1 + lambda_dice * DiceLoss
    # Rationale: equal weighting balances pixel-level accuracy (L1) with
    # boundary-shape quality (Dice). Dice is preferred over BCE because it is
    # robust to the strong foreground/background imbalance in portrait images.
    loss:
      lambda_l1:   0.5
      lambda_dice: 0.5

    # Dataset (AISegment)
    # Subsampling strategy: random shuffle with fixed seed, then take first
    # n_train / n_val / n_test pairs. This ensures reproducibility.
    data:
      clip_root:  "/kaggle/input/datasets/laurentmih/aisegmentcom-matting-human-datasets/clip_img"    # path to AISegment clip_img/ folder
      matte_root: "/kaggle/input/datasets/laurentmih/aisegmentcom-matting-human-datasets/matting"     # path to AISegment matting/  folder
      img_size:   [256, 256]          # resize all images to (H, W)
      n_train:    5000
      n_val:      500
      n_test:     500

    # Training
    training:
      seed:              42
      epochs:            30           # minimum 20 required; allow up to 30
      batch_size:        16
      num_workers:       4
      lr:                1.0e-4
      weight_decay:      1.0e-4
      lr_patience:       3            # ReduceLROnPlateau patience
      early_stop_patience: 7          # stop if val IoU doesn't improve for N epochs
      amp:               true         # automatic mixed precision (set false if no CUDA)

  # --------------------------------------------------------------------------
  # Neural Style Transfer
  # --------------------------------------------------------------------------
  nst:

    # VGG19 is used; frozen in eval mode.
    # Content layer : conv4_2 (index 4 in VGG19Features)
    # Style  layers : relu1_1, relu2_1, relu3_1, relu4_1, relu5_1

    height:         360            # resize content/style images to this height
                                   # (aspect ratio preserved for content)

    optimizer:      "adam"         # "adam" (recommended for video) or "lbfgs" (better quality, very slow per-frame)
    iterations:     200            # Adam steps per frame (500 for lbfgs single-image stylization)
    adam_lr:        10.0           # only used when optimizer = "adam"

    # Loss weights
    # Defaults produce a good balance for portraiture.
    # The video_pipeline uses these; visualize.py overrides style_weight for ablation.
    content_weight: 1.0e5          # α  (content fidelity)
    style_weight:   3.0e4          # β  (style strength)
    tv_weight:      1.0            # total-variation regularisation

    # Temporal consistency: when processing video frames, the stylised frame
    # t-1 is passed as `init_tensor` instead of the raw content frame.
    # This dramatically reduces flicker at zero extra parameters.
    temporal_consistency: true
