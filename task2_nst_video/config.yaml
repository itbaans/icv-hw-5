# =============================================================================
# Assignment 5 - Task 2 Configuration
# =============================================================================
# All hyperparameters for Task 2 are documented here for reproducibility.
# Run scripts from the task2_nst_video/ directory:
#   python matting/train.py    --config config.yaml
#   python video_pipeline.py   --config config.yaml
#   python visualize.py        --config config.yaml
# =============================================================================

task2:

  # --------------------------------------------------------------------------
  # Paths - fill these in once you add your video / style images
  # --------------------------------------------------------------------------
  input_video: "input_vid_1.mp4"           # your raw recording (unmodified)
  content_dir: "content/"                  # 5 frames extracted from the video
  style_dir:   "style/"                    # 3 public-domain paintings
  output_dir:  "outputs/"

  # Path to one seed image from Task 1 (used for VGG19 feature-map figure)
  seed_img_for_feature_maps: "/kaggle/input/datasets/abdullahahmedani/seeds-data/filtered/106.png"

  # Source image for the 1024×1024 branded poster.
  # Set this to one of your best stylised frames after running the pipeline.
  branded_poster_source: ""
  # Style-weight sweep values for the β/α ablation (3 required).
  # Matches beta_alpha_sweep in the canonical schema.
  style_weight_sweep: [1000.0, 100000.0, 10000000.0]

  # Style images used by video_pipeline.py.
  # The video is divided into equal segments; each style is applied to one segment.
  # List exactly 3 (one per required video variant section).
  style_images:
    - "style/new_style.jpg"     # segment 1  ← replace with your 3 style files
    - "style/regard-multiple-1989.jpg"     # segment 2
    - "style/water-lilies.jpg"     # segment 3
  # Legacy single-style key (used by visualize.py grid/ablation):
  style_image: "style/new_style.jpg"

  # --------------------------------------------------------------------------
  # Human Matting Model
  # --------------------------------------------------------------------------
  matting:

    checkpoint: "/kaggle/input/models/abdullahahmedani/matting-model/pytorch/default/1/matting_best.pth"   # written by matting/train.py

    # Model config
    bilinear: false   # use ConvTranspose2d upsampling (false) vs bilinear (true)

    # Loss weights: L_total = lambda_l1 * L1 + lambda_dice * DiceLoss
    loss:
      lambda_l1:   0.5
      lambda_dice: 0.5

    # Dataset (AISegment)
    data:
      clip_root:  "/kaggle/input/datasets/laurentmih/aisegmentcom-matting-human-datasets/clip_img"
      matte_root: "/kaggle/input/datasets/laurentmih/aisegmentcom-matting-human-datasets/matting"
      img_size:   [256, 256]
      n_train:    5000
      n_val:      500
      n_test:     500

    # Training
    training:
      seed:              42
      epochs:            30
      batch_size:        16
      num_workers:       4
      lr:                1.0e-4
      weight_decay:      1.0e-4
      lr_patience:       3
      early_stop_patience: 7
      amp:               true

  # --------------------------------------------------------------------------
  # Neural Style Transfer
  # --------------------------------------------------------------------------
  nst:

    # Architecture (VGG19, frozen, eval mode)
    backbone:      "VGG19"
    content_layer: "relu4_2"         # conv4_2 — mid-level semantic content
    style_layers:                    # five layers for multi-scale style
      - "relu1_1"
      - "relu2_1"
      - "relu3_1"
      - "relu4_1"
      - "relu5_1"

    # Subsets used for the layer ablation figure
    shallow_style_layers: ["relu1_1", "relu2_1"]
    deep_style_layers:    ["relu4_1", "relu5_1"]

    height:         512            # resize content/style images to this height
                                   # (aspect ratio preserved for content)

    # max_frames: cap frames processed (0 = all frames)
    max_frames:     0

    optimizer:        "lbfgs"      # "adam" (~1s/frame) or "lbfgs" (~60s/frame)
    n_steps:          500          # steps for STATIC NST (visualize.py ablation figures,
                                   # no temporal init — needs more iterations to converge)
    iterations:       100          # steps per VIDEO frame 1+ (temporal init from t-1
                                   # means the image is already close → fewer steps)
    iterations_first: 500          # steps for video frame 0 (no prior frame = same as static)
    adam_lr:          10.0         # only used when optimizer = "adam"

    # Loss weights  (plain floats — avoid YAML sci notation → string parse bugs)
    # β/α ratio = style_weight / content_weight
    #   ratio ~ 10    → moderate (content visible)
    #   ratio ~ 100   → strong stylisation  ← default
    #   ratio ~ 1000+ → abstract / melted
    content_weight: 100000.0       # α  (content fidelity)
    style_weight:   10000000.0     # β  (style strength)   β/α = 100
    tv_weight:      1.0            # total-variation smoothness

    # Temporal consistency: init frame t from stylised frame t-1
    temporal_consistency: true
